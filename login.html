<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* Gradient Background */
  background: linear-gradient(135deg, #5f9cff, #c850c0);

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* White Box */
.login-box {
  background: white;
  padding: 40px;
  width: 320px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 25px;
}

/* Input */
.input-box {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  outline: none;
}

/* Forgot */
.forgot {
  text-align: right;
  font-size: 13px;
  margin-bottom: 10px;
}

.forgot a {
  text-decoration: none;
  color: #888;
}

/* Button */
.login-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;

  background: linear-gradient(to right, #36d1dc, #c850c0);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

/* Social */
.social {
  margin-top: 20px;
}

.social span {
  font-size: 13px;
  color: #777;
}

.icons {
  margin-top: 10px;
}

.icons button {
  border: none;
  margin: 5px;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

.fb { background: #3b5998; color: white; }
.tw { background: #1da1f2; color: white; }
.gg { background: #db4437; color: white; }

/* Signup */
.signup {
  margin-top: 20px;
  font-size: 14px;
}

.signup a {
  color: #c850c0;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="login-box">

  <h2>Login</h2>

  <input type="text" class="input-box" placeholder="Username">
  <input type="password" class="input-box" placeholder="Password">

  <div class="forgot">
    <a href="#">Forgot password?</a>
  </div>

  <button class="login-btn" onclick="login()">LOGIN</button>

  <div class="social">
    <span>Or Sign Up Using</span>
    <div class="icons">
      <button class="fb">F</button>
      <button class="tw">T</button>
      <button class="gg">G</button>
    </div>
  </div>

  <div class="signup">
    Or Sign Up Using <br>
    <a href="#">SIGN UP</a>
  </div>

</div>

<script>
function login(){
  alert("Login Successful");
  window.location.href = "index.html";
}
</script>

</body>
